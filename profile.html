<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – Ad Meva</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body {
      font-family: 'Inter', sans-serif;
      background: #fffde7;
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 40px;
      border-bottom: 2px solid #000;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header .left img {
      height: 50px;
      width: auto;
      object-fit: contain;
    }
    .header .left span {
      font-size: 18px;
      font-weight: 900;
      color: #000;
      letter-spacing: -0.5px;
    }
    .header .right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header .right .user-name {
      font-size: 13px;
      font-weight: 700;
      color: #000;
    }
    .header .right .back-link {
      padding: 6px 16px;
      border: 2px solid #000;
      background: transparent;
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      color: #000;
      text-decoration: none;
      transition: all 0.3s;
    }
    .header .right .back-link:hover {
      background: #000;
      color: #fff;
    }

    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    .profile-card {
      background: #fff;
      border: 3px solid #000;
      box-shadow: 10px 10px 0 #000;
      padding: 36px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .profile-card .avatar {
      width: 80px;
      height: 80px;
      min-width: 80px;
      background: #ffd600;
      border: 3px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 900;
      color: #000;
    }
    .profile-card .info .name {
      font-size: 24px;
      font-weight: 900;
      color: #000;
      letter-spacing: -0.5px;
    }
    .profile-card .info .email {
      font-size: 14px;
      color: #bbb;
      margin-top: 2px;
    }
    .profile-card .info .joined {
      font-size: 12px;
      color: #ccc;
      margin-top: 4px;
      font-weight: 500;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stats-grid .stat {
      background: #fff;
      border: 3px solid #000;
      padding: 20px;
      text-align: center;
      box-shadow: 6px 6px 0 #000;
    }
    .stats-grid .stat .num {
      font-size: 24px;
      font-weight: 900;
      color: #000;
    }
    .stats-grid .stat .lbl {
      font-size: 10px;
      font-weight: 700;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 4px;
    }

    .section {
      background: #fff;
      border: 3px solid #000;
      box-shadow: 8px 8px 0 #000;
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .section h3 {
      font-size: 16px;
      font-weight: 800;
      color: #000;
      margin-bottom: 20px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .lbl2 { font-size: 12px; color: #bbb; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .info-row .val2 { font-size: 14px; color: #000; font-weight: 600; }

    .input-group { margin-bottom: 16px }
    .input-group label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }
    .input-group input {
      width: 100%;
      padding: 12px 14px;
      background: #fafafa;
      border: 2px solid #eee;
      border-radius: 0;
      color: #333;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.25s;
    }
    .input-group input:focus {
      border-color: #000;
      background: #fff;
    }

    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 0;
      font-size: 12px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      background: #000;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #ffd600;
      color: #000;
      box-shadow: 6px 6px 0 rgba(0,0,0,0.1);
    }
    .btn-sm {
      padding: 8px 18px;
      font-size: 10px;
    }

    .success-msg {
      background: #ffd600;
      border: 2px solid #000;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #000;
      margin-bottom: 20px;
      display: none;
    }

    @media (max-width: 620px) {
      .header { padding: 4px 16px; }
      .header .left span { display: none; }
      .main { padding: 24px 12px 40px; }
      .profile-card { flex-direction: column; text-align: center; padding: 24px; }
      .stats-grid { grid-template-columns: 1fr; }
      .section { padding: 20px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="left">
    <img src="logo.png" alt="Ad Meva">
    <span>AD MEVA</span>
  </div>
  <div class="right">
    <span class="user-name" id="userNameDisplay"></span>
    <a href="dashboard.html" class="back-link">Dashboard</a>
  </div>
</div>

<div class="main">
  <div class="success-msg" id="successMsg"></div>

  <div class="profile-card">
    <div class="avatar" id="avatarLetter">A</div>
    <div class="info">
      <div class="name" id="displayName">—</div>
      <div class="email" id="displayEmail">—</div>
      <div class="joined" id="displayJoined">—</div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat">
      <div class="num" id="statBalance">₹0</div>
      <div class="lbl">Balance</div>
    </div>
    <div class="stat">
      <div class="num" id="statTasks">0</div>
      <div class="lbl">Tasks Done</div>
    </div>
    <div class="stat">
      <div class="num" id="statWithdrawals">0</div>
      <div class="lbl">Withdrawals</div>
    </div>
  </div>

  <div class="section">
    <h3>Account Details</h3>
    <div class="info-row"><span class="lbl2">Full Name</span><span class="val2" id="detailName">—</span></div>
    <div class="info-row"><span class="lbl2">Email</span><span class="val2" id="detailEmail">—</span></div>
    <div class="info-row"><span class="lbl2">Member Since</span><span class="val2" id="detailJoined">—</span></div>
    <div class="info-row"><span class="lbl2">Total Earned</span><span class="val2" id="detailEarned">₹0</span></div>
    <div class="info-row"><span class="lbl2">Password</span><span class="val2">••••••••</span></div>
  </div>

  <div class="section">
    <h3>Edit Profile</h3>
    <form id="profileForm">
      <div class="input-group">
        <label for="editName">Full Name</label>
        <input type="text" id="editName" required>
      </div>
      <button type="submit" class="btn">Save Changes</button>
    </form>
  </div>

  <div class="section">
    <h3>Account Actions</h3>
    <div class="info-row">
      <span class="lbl2">Logout from all devices</span>
      <button class="btn btn-sm" id="logoutAllBtn">Logout</button>
    </div>
  </div>
</div>

<script>
  const sessionEmail = localStorage.getItem('admeva_session');
  if (!sessionEmail) { window.location.href = 'signup.html'; }

  const data = localStorage.getItem('admeva_user_' + sessionEmail);
  if (!data) { localStorage.removeItem('admeva_session'); window.location.href = 'signup.html'; }

  const user = JSON.parse(data);

  function refreshDisplay() {
    const letter = user.name ? user.name.charAt(0).toUpperCase() : '?';
    document.getElementById('avatarLetter').textContent = letter;
    document.getElementById('displayName').textContent = user.name || '—';
    document.getElementById('displayEmail').textContent = user.email || '—';
    const joined = user.joined ? new Date(user.joined).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' }) : '—';
    document.getElementById('displayJoined').textContent = 'Joined ' + joined;

    document.getElementById('statBalance').textContent = '₹' + (user.balance || 0);
    document.getElementById('statTasks').textContent = user.tasksDone || 0;
    document.getElementById('statWithdrawals').textContent = (user.withdrawals || []).length;

    document.getElementById('detailName').textContent = user.name || '—';
    document.getElementById('detailEmail').textContent = user.email || '—';
    document.getElementById('detailJoined').textContent = joined;
    document.getElementById('detailEarned').textContent = '₹' + (user.totalEarned || 0);

    document.getElementById('editName').value = user.name || '';
  }
  refreshDisplay();

  document.getElementById('profileForm').addEventListener('submit', e => {
    e.preventDefault();
    const newName = document.getElementById('editName').value.trim();
    if (!newName) return;
    user.name = newName;
    localStorage.setItem('admeva_user_' + sessionEmail, JSON.stringify(user));
    const msg = document.getElementById('successMsg');
    msg.textContent = 'Profile updated successfully!';
    msg.style.display = 'block';
    refreshDisplay();
    setTimeout(() => { msg.style.display = 'none'; }, 3000);
  });

  document.getElementById('logoutAllBtn').addEventListener('click', () => {
    if (confirm('Are you sure you want to logout?')) {
      localStorage.removeItem('admeva_session');
      window.location.href = 'index.html';
    }
  });
</script>
</body>
</html>
