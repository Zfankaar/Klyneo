<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks – Ad Meva</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body {
      font-family: 'Inter', sans-serif;
      background: #fffde7;
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 40px;
      border-bottom: 2px solid #000;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header .left img {
      height: 50px;
      width: auto;
      object-fit: contain;
    }
    .header .left span {
      font-size: 18px;
      font-weight: 900;
      color: #000;
      letter-spacing: -0.5px;
    }
    .header .right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header .right .user-name {
      font-size: 13px;
      font-weight: 700;
      color: #000;
    }
    .header .right .back-link {
      padding: 6px 16px;
      border: 2px solid #000;
      background: transparent;
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      color: #000;
      text-decoration: none;
      transition: all 0.3s;
    }
    .header .right .back-link:hover {
      background: #000;
      color: #fff;
    }

    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .top-bar h1 {
      font-size: 28px;
      font-weight: 900;
      color: #000;
      letter-spacing: -1px;
    }
    .top-bar .earn-today {
      font-size: 14px;
      font-weight: 700;
      color: #888;
    }
    .top-bar .earn-today span {
      color: #000;
      font-size: 20px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stats-row .s {
      background: #fff;
      border: 3px solid #000;
      padding: 18px;
      text-align: center;
      box-shadow: 6px 6px 0 #000;
    }
    .stats-row .s .num {
      font-size: 22px;
      font-weight: 900;
      color: #000;
    }
    .stats-row .s .lbl {
      font-size: 10px;
      font-weight: 700;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 2px;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .task {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 3px solid #000;
      padding: 20px 24px;
      box-shadow: 6px 6px 0 #000;
      transition: all 0.25s;
    }
    .task:hover {
      transform: translate(-2px, -2px);
      box-shadow: 10px 10px 0 #000;
    }
    .task .left-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .task .left-info .thumb {
      width: 44px;
      height: 44px;
      min-width: 44px;
      background: #ffd600;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .task .left-info .meta .title {
      font-size: 15px;
      font-weight: 800;
      color: #000;
    }
    .task .left-info .meta .sub {
      font-size: 12px;
      color: #bbb;
      font-weight: 500;
      margin-top: 2px;
    }
    .task .right-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .task .right-info .reward {
      font-size: 18px;
      font-weight: 900;
      color: #000;
    }
    .task .right-info .btn-task {
      padding: 10px 22px;
      border: none;
      border-radius: 0;
      font-size: 11px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      background: #000;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
    }
    .task .right-info .btn-task:hover {
      background: #ffd600;
      color: #000;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
    }
    .task .right-info .btn-task:disabled {
      background: #eee;
      color: #ccc;
      cursor: not-allowed;
      box-shadow: none;
    }
    .task .right-info .btn-task:disabled:hover {
      background: #eee;
      color: #ccc;
    }
    .task.done {
      opacity: 0.6;
    }
    .task.done .thumb {
      background: #eee;
    }

    .empty-tasks {
      text-align: center;
      padding: 60px 20px;
      background: #fff;
      border: 3px solid #000;
      box-shadow: 8px 8px 0 #000;
    }
    .empty-tasks .icon { margin-bottom: 12px; }
    .empty-tasks p { font-size: 16px; font-weight: 700; color: #ccc; }

    @media (max-width: 620px) {
      .header { padding: 4px 16px; }
      .header .left span { display: none; }
      .main { padding: 24px 12px 40px; }
      .top-bar { flex-direction: column; align-items: start; gap: 8px; }
      .stats-row { grid-template-columns: 1fr; }
      .task { flex-direction: column; align-items: start; gap: 12px; }
      .task .right-info { width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="left">
    <img src="logo.png" alt="Ad Meva">
    <span>AD MEVA</span>
  </div>
  <div class="right">
    <span class="user-name" id="userNameDisplay"></span>
    <a href="dashboard.html" class="back-link">Dashboard</a>
  </div>
</div>

<div class="main">
  <div class="top-bar">
    <h1>Tasks</h1>
    <div class="earn-today">Today's Earnings: <span id="todayEarnings">₹0</span></div>
  </div>

  <div class="stats-row">
    <div class="s">
      <div class="num" id="statCompleted">0</div>
      <div class="lbl">Completed</div>
    </div>
    <div class="s">
      <div class="num" id="statAvailable">0</div>
      <div class="lbl">Available</div>
    </div>
    <div class="s">
      <div class="num" id="statTotalEarned">₹0</div>
      <div class="lbl">Total Earned</div>
    </div>
  </div>

  <div class="task-list" id="taskList"></div>
</div>

<script>
  const sessionEmail = localStorage.getItem('admeva_session');
  if (!sessionEmail) { window.location.href = 'signup.html'; }

  const data = localStorage.getItem('admeva_user_' + sessionEmail);
  if (!data) { localStorage.removeItem('admeva_session'); window.location.href = 'signup.html'; }

  const user = JSON.parse(data);
  document.getElementById('userNameDisplay').textContent = user.name;

  const allTasks = [
    { id: 'ad1', title: 'Watch 15s Ad', sub: 'Watch a short video ad', reward: 2, icon: '🎬' },
    { id: 'ad2', title: 'Watch 30s Ad', sub: 'Watch a standard video ad', reward: 5, icon: '📺' },
    { id: 'ad3', title: 'Sponsored Video', sub: 'View sponsored content', reward: 3, icon: '📱' },
    { id: 'ad4', title: 'Survey Ad', sub: 'Answer a quick poll', reward: 8, icon: '📊' },
    { id: 'ad5', title: 'Reward Video', sub: 'Watch premium ad', reward: 10, icon: '⭐' },
    { id: 'ad6', title: 'App Install Ad', sub: 'Preview app promotion', reward: 6, icon: '📲' },
    { id: 'ad7', title: 'Double Reward', sub: 'Watch two ads in a row', reward: 15, icon: '🔥' },
    { id: 'ad8', title: 'Bonus Clip', sub: 'Special bonus content', reward: 12, icon: '💎' },
  ];

  if (!user.completedTasks) user.completedTasks = [];
  const doneSet = new Set(user.completedTasks);

  function updateStats() {
    const totalEarned = user.totalEarned || 0;
    document.getElementById('statCompleted').textContent = user.completedTasks.length;
    document.getElementById('statAvailable').textContent = allTasks.length - user.completedTasks.length;
    document.getElementById('statTotalEarned').textContent = '₹' + totalEarned;
    const todayKey = new Date().toDateString();
    const todayEarned = (user.dailyEarnings && user.dailyEarnings[todayKey]) || 0;
    document.getElementById('todayEarnings').textContent = '₹' + todayEarned;
  }

  function renderTasks() {
    const container = document.getElementById('taskList');
    const available = allTasks.filter(t => !doneSet.has(t.id));
    const completed = allTasks.filter(t => doneSet.has(t.id));

    if (available.length === 0 && completed.length === 0) {
      container.innerHTML = '<div class="empty-tasks"><div class="icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><p>No tasks available right now. Check back soon!</p></div>';
      return;
    }

    let html = '';
    [...available, ...completed].forEach(t => {
      const isDone = doneSet.has(t.id);
      html += '<div class="task' + (isDone ? ' done' : '') + '">' +
        '<div class="left-info">' +
          '<div class="thumb">' +
            '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
              (isDone
                ? '<polyline points="20 6 9 17 4 12"/>'
                : '<polygon points="5 3 19 12 5 21 5 3"/>'
              ) +
            '</svg>' +
          '</div>' +
          '<div class="meta">' +
            '<div class="title">' + t.title + '</div>' +
            '<div class="sub">' + t.sub + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="right-info">' +
          '<div class="reward">₹' + t.reward + '</div>' +
          '<button class="btn-task" data-id="' + t.id + '" data-reward="' + t.reward + '"' + (isDone ? ' disabled' : '') + '>' + (isDone ? 'Done' : 'Watch') + '</button>' +
        '</div>' +
      '</div>';
    });
    container.innerHTML = html;
    updateStats();

    container.querySelectorAll('.btn-task:not(:disabled)').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.dataset.id;
        const reward = parseInt(this.dataset.reward);
        completeTask(id, reward);
      });
    });
  }

  function completeTask(id, reward) {
    if (doneSet.has(id)) return;
    doneSet.add(id);
    user.completedTasks.push(id);

    if (!user.transactions) user.transactions = [];
    user.transactions.push({ amount: reward, desc: 'Task: ' + allTasks.find(t => t.id === id).title, type: 'earning', date: new Date().toISOString(), status: 'completed' });

    user.balance = (user.balance || 0) + reward;
    user.totalEarned = (user.totalEarned || 0) + reward;
    user.tasksDone = (user.tasksDone || 0) + 1;

    const todayKey = new Date().toDateString();
    if (!user.dailyEarnings) user.dailyEarnings = {};
    user.dailyEarnings[todayKey] = (user.dailyEarnings[todayKey] || 0) + reward;

    localStorage.setItem('admeva_user_' + sessionEmail, JSON.stringify(user));
    renderTasks();
  }

  renderTasks();
</script>
</body>
</html>
