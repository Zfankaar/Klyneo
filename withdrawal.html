<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdrawal – Ad Meva</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body {
      font-family: 'Inter', sans-serif;
      background: #fffde7;
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 40px;
      border-bottom: 2px solid #000;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header .left img {
      height: 50px;
      width: auto;
      object-fit: contain;
    }
    .header .left span {
      font-size: 18px;
      font-weight: 900;
      color: #000;
      letter-spacing: -0.5px;
    }
    .header .right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header .right .user-name {
      font-size: 13px;
      font-weight: 700;
      color: #000;
    }
    .header .right .back-link {
      padding: 6px 16px;
      border: 2px solid #000;
      background: transparent;
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      color: #000;
      text-decoration: none;
      transition: all 0.3s;
    }
    .header .right .back-link:hover {
      background: #000;
      color: #fff;
    }

    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    .bal-card {
      background: #ffd600;
      border: 3px solid #000;
      padding: 28px 32px;
      box-shadow: 10px 10px 0 #000;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .bal-card .lbl {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(0,0,0,0.4);
    }
    .bal-card .amt {
      font-size: 36px;
      font-weight: 900;
      color: #000;
      letter-spacing: -1.5px;
    }

    .form-box {
      background: #fff;
      border: 3px solid #000;
      box-shadow: 10px 10px 0 #000;
      padding: 32px;
      margin-bottom: 32px;
    }
    .form-box .title {
      font-size: 18px;
      font-weight: 800;
      color: #000;
      margin-bottom: 24px;
    }

    .input-group { margin-bottom: 18px }
    .input-group label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }
    .input-group input, .input-group select {
      width: 100%;
      padding: 14px 16px;
      background: #fafafa;
      border: 2px solid #eee;
      border-radius: 0;
      color: #333;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.25s;
    }
    .input-group input:focus, .input-group select:focus {
      border-color: #000;
      background: #fff;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
    }
    .info-row .lbl2 { color: #bbb; }
    .info-row .val2 { color: #000; font-weight: 700; }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 0;
      font-size: 13px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      background: #000;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: all 0.3s;
      margin-top: 8px;
    }
    .btn:hover {
      background: #ffd600;
      color: #000;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.1);
    }
    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .btn:disabled:hover {
      background: #000;
      color: #fff;
      box-shadow: none;
    }

    .history {
      background: #fff;
      border: 3px solid #000;
      box-shadow: 8px 8px 0 #000;
      padding: 24px 28px;
    }
    .history h3 {
      font-size: 16px;
      font-weight: 800;
      color: #000;
      margin-bottom: 16px;
    }
    .history table {
      width: 100%;
      border-collapse: collapse;
    }
    .history table th {
      font-size: 10px;
      font-weight: 700;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: left;
      padding: 8px 0;
      border-bottom: 2px solid #eee;
    }
    .history table td {
      font-size: 13px;
      color: #888;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .history table td:last-child { text-align: right; }
    .history .badge {
      display: inline-block;
      padding: 2px 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .history .badge.pending { background: #ffd600; color: #000; }
    .history .badge.completed { background: #000; color: #fff; }
    .history .badge.rejected { background: #eee; color: #bbb; }
    .history .empty {
      font-size: 13px;
      color: #ccc;
      padding: 20px 0;
      text-align: center;
    }

    @media (max-width: 620px) {
      .header { padding: 4px 16px; }
      .header .left span { display: none; }
      .main { padding: 24px 12px 40px; }
      .bal-card { flex-direction: column; align-items: start; gap: 8px; }
      .form-box { padding: 20px; }
      .history { padding: 16px; overflow-x: auto; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="left">
    <img src="logo.png" alt="Ad Meva">
    <span>AD MEVA</span>
  </div>
  <div class="right">
    <span class="user-name" id="userNameDisplay"></span>
    <a href="dashboard.html" class="back-link">Dashboard</a>
  </div>
</div>

<div class="main">
  <div class="bal-card">
    <div>
      <div class="lbl">Available Balance</div>
      <div class="amt">₹<span id="balanceDisplay">0</span></div>
    </div>
    <div style="text-align:right;">
      <div class="lbl">Min. Withdrawal</div>
      <div class="amt" style="font-size:22px;">₹50</div>
    </div>
  </div>

  <div class="form-box">
    <div class="title">Request Withdrawal</div>
    <div class="input-group">
      <label for="withdrawAmount">Amount (₹)</label>
      <input type="number" id="withdrawAmount" placeholder="Enter amount" min="50" step="1">
    </div>
    <div class="input-group">
      <label for="withdrawMethod">Withdrawal Method</label>
      <select id="withdrawMethod">
        <option value="upi">UPI Transfer</option>
        <option value="bank">Bank Transfer</option>
        <option value="paytm">Paytm Wallet</option>
      </select>
    </div>
    <div class="input-group">
      <label for="withdrawAccount">Account / UPI ID</label>
      <input type="text" id="withdrawAccount" placeholder="yourname@upi or account details">
    </div>

    <div style="margin:20px 0;">
      <div class="info-row"><span class="lbl2">Requested Amount</span><span class="val2" id="previewAmount">₹0</span></div>
      <div class="info-row"><span class="lbl2">Processing Fee</span><span class="val2">₹0</span></div>
      <div class="info-row"><span class="lbl2">You'll Receive</span><span class="val2" id="previewNet">₹0</span></div>
    </div>

    <button class="btn" id="submitWithdraw">Submit Request</button>
    <p id="withdrawError" style="color:#e65050;font-size:11px;font-weight:600;margin-top:8px;display:none;"></p>
  </div>

  <div class="history">
    <h3>Withdrawal History</h3>
    <table>
      <thead>
        <tr><th>Date</th><th>Method</th><th>Amount</th><th>Status</th></tr>
      </thead>
      <tbody id="historyBody">
        <tr><td colspan="4" class="empty">No withdrawal requests yet.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const sessionEmail = localStorage.getItem('admeva_session');
  if (!sessionEmail) { window.location.href = 'signup.html'; }

  const data = localStorage.getItem('admeva_user_' + sessionEmail);
  if (!data) { localStorage.removeItem('admeva_session'); window.location.href = 'signup.html'; }

  const user = JSON.parse(data);
  document.getElementById('userNameDisplay').textContent = user.name;
  document.getElementById('balanceDisplay').textContent = user.balance || 0;

  document.getElementById('withdrawAmount').addEventListener('input', function() {
    const val = parseInt(this.value) || 0;
    document.getElementById('previewAmount').textContent = '₹' + val;
    document.getElementById('previewNet').textContent = '₹' + val;
  });

  function showErr(msg) {
    const el = document.getElementById('withdrawError');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  document.getElementById('submitWithdraw').addEventListener('click', function() {
    showErr('');
    const balance = user.balance || 0;
    const amount = parseInt(document.getElementById('withdrawAmount').value);
    const method = document.getElementById('withdrawMethod').value;
    const account = document.getElementById('withdrawAccount').value.trim();

    if (!amount || amount < 50) { showErr('Minimum withdrawal is ₹50.'); return; }
    if (amount > balance) { showErr('Insufficient balance. You have ₹' + balance); return; }
    if (!account) { showErr('Please enter your UPI ID or account details.'); return; }

    if (!user.transactions) user.transactions = [];
    if (!user.withdrawals) user.withdrawals = [];

    user.transactions.push({ amount: -amount, desc: 'Withdrawal via ' + method.toUpperCase(), type: 'withdrawal', date: new Date().toISOString(), status: 'pending' });
    user.withdrawals.push({ amount: amount, method: method, account: account, date: new Date().toISOString(), status: 'pending' });
    user.balance = balance - amount;
    localStorage.setItem('admeva_user_' + sessionEmail, JSON.stringify(user));

    alert('Withdrawal request submitted!\nAmount: ₹' + amount + '\nMethod: ' + method.toUpperCase() + '\nAccount: ' + account);
    location.reload();
  });

  const withdrawals = user.withdrawals || [];
  const tbody = document.getElementById('historyBody');
  if (withdrawals.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">No withdrawal requests yet.</td></tr>';
  } else {
    tbody.innerHTML = withdrawals.slice().reverse().map(w => {
      const date = w.date ? new Date(w.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) : '—';
      const statusClass = w.status === 'completed' ? 'completed' : w.status === 'rejected' ? 'rejected' : 'pending';
      return '<tr><td>' + date + '</td><td>' + w.method.toUpperCase() + '</td><td>₹' + w.amount + '</td><td><span class="badge ' + statusClass + '">' + w.status + '</span></td></tr>';
    }).join('');
  }
</script>
</body>
</html>
