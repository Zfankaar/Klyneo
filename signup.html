<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Meva – Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body {
      font-family: 'Inter', sans-serif;
      background: #fffde7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .wrap {
      display: flex;
      width: 100%;
      max-width: 1000px;
      min-height: 600px;
      background: #fff;
      border-radius: 0;
      box-shadow: 20px 20px 0 #000;
      border: 3px solid #000;
      animation: in 0.5s ease;
    }
    @keyframes in {
      from{opacity:0;transform:translateY(30px)}
      to{opacity:1;transform:translateY(0)}
    }
    .brand {
      width: 40%;
      background: #ffd600;
      padding: 56px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .brand::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(0,0,0,0.02) 20px, rgba(0,0,0,0.02) 21px);
    }
    .brand img {
      width: 170px;
      height: 170px;
      object-fit: contain;
      position: relative;
      z-index: 1;
    }
    .brand h1 {
      font-size: 44px;
      font-weight: 900;
      color: #000;
      line-height: 1;
      margin-top: 28px;
      letter-spacing: -1.5px;
      position: relative;
      z-index: 1;
    }
    .brand .sub {
      font-size: 18px;
      font-weight: 700;
      color: rgba(0,0,0,0.4);
      margin-top: 8px;
      position: relative;
      z-index: 1;
    }
    .brand .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 32px;
      padding: 8px 16px;
      background: #000;
      color: #ffd600;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
      width: fit-content;
    }
    .form-col {
      width: 60%;
      padding: 48px 48px 40px;
    }
    .back {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .back a {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #ccc;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .back a:hover { color: #000; }
    .back a svg { width: 14px; height: 14px; stroke: currentColor; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 2px solid #000;
    }
    .tab {
      padding: 12px 0;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      color: #ccc;
      background: none;
      border: none;
      cursor: pointer;
      margin-right: 28px;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      transition: color 0.2s;
    }
    .tab.active { color: #000; }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 2px;
      background: #000;
    }
    .form-section { display: none }
    .form-section.active { display: block; animation: sIn 0.3s ease }
    @keyframes sIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .input-group { margin-bottom: 18px }
    .input-group label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: #fafafa;
      border: 2px solid #eee;
      border-radius: 0;
      color: #333;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.25s;
    }
    .input-group input::placeholder { color: #e0e0e0; }
    .input-group input:focus {
      border-color: #000;
      background: #fff;
    }
    .password-wrap { position: relative }
    .password-wrap input { padding-right: 48px }
    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 13px;
      cursor: pointer;
      color: #ccc;
      padding: 4px;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: #000; }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 24px 0;
    }
    .checkbox-row input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      min-width: 18px;
      border: 2px solid #ddd;
      border-radius: 0;
      background: #fafafa;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }
    .checkbox-row input[type="checkbox"]:checked {
      background: #000;
      border-color: #000;
    }
    .checkbox-row input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      color: #ffd600;
      font-size: 12px;
      font-weight: 800;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .checkbox-row label { font-size: 11px; color: #bbb; cursor: pointer; }
    .checkbox-row label a { color: #000; text-decoration: none; font-weight: 600; }
    .forgot-link { text-align: right; margin-bottom: 20px }
    .forgot-link a { font-size: 11px; color: #ccc; text-decoration: none; font-weight: 600; transition: color 0.2s; }
    .forgot-link a:hover { color: #000; }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 0;
      font-size: 13px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      background: #000;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #ffd600;
      color: #000;
      transform: translateY(-2px);
      box-shadow: 8px 8px 0 rgba(0,0,0,0.1);
    }
    .error-msg {
      color: #e65050;
      font-size: 11px;
      font-weight: 600;
      margin-top: 4px;
      display: none;
    }
    .switch-text { text-align: center; margin-top: 18px; font-size: 12px; color: #ccc; }
    .switch-text a { color: #000; text-decoration: none; font-weight: 700; cursor: pointer; }
    @media (max-width: 820px) {
      .wrap { flex-direction: column; max-width: 480px; box-shadow: 10px 10px 0 #000; }
      .brand { width: 100%; padding: 32px 24px 24px; }
      .brand h1 { font-size: 34px; }
      .brand .badge { margin-top: 20px; }
      .form-col { width: 100%; padding: 28px; }
    }
    @media (max-width: 480px) {
      body { padding: 12px; }
      .wrap { box-shadow: 6px 6px 0 #000; border-width: 2px; }
      .brand { padding: 20px 16px 16px; }
      .brand h1 { font-size: 28px; }
      .brand img { width: 56px; height: 56px; }
      .form-col { padding: 20px 16px 24px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <img src="logo.png" alt="Ad Meva">
    <h1>EARN<br>BIG</h1>
    <div class="sub">Start today. Get paid.</div>
    <div class="badge">BETA LIVE NOW</div>
  </div>
  <div class="form-col">
    <div class="back">
      <a href="index.html" id="backBtn">
        <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        BACK
      </a>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="signup">Sign Up</button>
      <button class="tab" data-tab="signin">Sign In</button>
    </div>
    <div class="form-section active" id="section-signup">
      <form id="signupForm" autocomplete="off">
        <div class="input-group">
          <label for="su-name">Full Name</label>
          <input type="text" id="su-name" placeholder="John Doe" required>
        </div>
        <div class="input-group">
          <label for="su-email">Email</label>
          <input type="email" id="su-email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label for="su-pass">Password</label>
          <div class="password-wrap">
            <input type="password" id="su-pass" placeholder="Create password" required>
            <button type="button" class="toggle-pass" data-for="su-pass"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="agree" required>
          <label for="agree">I agree to <a href="terms.html">Terms</a> &amp; <a href="privacy.html">Privacy</a></label>
        </div>
        <div class="error-msg" id="su-error"></div>
        <button type="submit" class="btn">Create Account →</button>
      </form>
      <p class="switch-text">Already a member? <a class="switch-tab" data-tab="signin">Sign In</a></p>
    </div>
    <div class="form-section" id="section-signin">
      <form id="signinForm" autocomplete="off">
        <div class="input-group">
          <label for="si-email">Email</label>
          <input type="email" id="si-email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label for="si-pass">Password</label>
          <div class="password-wrap">
            <input type="password" id="si-pass" placeholder="Enter password" required>
            <button type="button" class="toggle-pass" data-for="si-pass"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
        </div>
        <div class="forgot-link"><a href="#">Forgot password?</a></div>
        <div class="error-msg" id="si-error"></div>
        <button type="submit" class="btn">Sign In →</button>
      </form>
      <p class="switch-text">New here? <a class="switch-tab" data-tab="signup">Sign Up</a></p>
    </div>
  </div>
</div>
<script>
  const tabs = document.querySelectorAll('.tab');
  const secs = { signup: document.getElementById('section-signup'), signin: document.getElementById('section-signin') };
  function switchTab(id) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === id));
    Object.keys(secs).forEach(k => secs[k].classList.toggle('active', k === id));
  }
  tabs.forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
  document.querySelectorAll('.switch-tab').forEach(el => {
    el.addEventListener('click', e => { e.preventDefault(); switchTab(el.dataset.tab) });
  });
  document.querySelectorAll('.toggle-pass').forEach(btn => {
    btn.addEventListener('click', () => {
      const inp = document.getElementById(btn.dataset.for);
      const isPass = inp.type === 'password';
      inp.type = isPass ? 'text' : 'password';
      btn.innerHTML = isPass
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    });
  });

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  document.getElementById('signupForm').addEventListener('submit', e => {
    e.preventDefault();
    showErr('su-error', '');
    const name = document.getElementById('su-name').value.trim();
    const email = document.getElementById('su-email').value.trim();
    const pass = document.getElementById('su-pass').value;
    if (!name || !email || !pass) { showErr('su-error', 'All fields are required.'); return; }
    if (pass.length < 6) { showErr('su-error', 'Password must be at least 6 characters.'); return; }
    if (localStorage.getItem('admeva_user_' + email)) { showErr('su-error', 'Email already registered. Sign in instead.'); return; }
    const user = { name, email, password: pass, balance: 0, transactions: [], joined: new Date().toISOString() };
    localStorage.setItem('admeva_user_' + email, JSON.stringify(user));
    localStorage.setItem('admeva_session', email);
    window.location.href = 'dashboard.html';
  });

  document.getElementById('signinForm').addEventListener('submit', e => {
    e.preventDefault();
    showErr('si-error', '');
    const email = document.getElementById('si-email').value.trim();
    const pass = document.getElementById('si-pass').value;
    if (!email || !pass) { showErr('si-error', 'All fields are required.'); return; }
    const data = localStorage.getItem('admeva_user_' + email);
    if (!data) { showErr('si-error', 'No account found. Sign up first.'); return; }
    const user = JSON.parse(data);
    if (user.password !== pass) { showErr('si-error', 'Incorrect password.'); return; }
    localStorage.setItem('admeva_session', email);
    window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
